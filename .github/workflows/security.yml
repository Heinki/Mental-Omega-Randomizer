name: Security checks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '23 4 * * 1'

permissions:
  contents: read

jobs:
  package-build:
    name: Windows package build
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: requirements-build.txt
      - name: Install pinned build dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-build.txt
      - name: Compile source
        run: python -m compileall -q .
      - name: Build executable
        shell: powershell
        run: .\build_exe.ps1 -Output 'release\MentalOmegaRandomizer.exe'

  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
      - name: Analyze
        uses: github/codeql-action/analyze@v4

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Reject vulnerable dependency changes
        uses: actions/dependency-review-action@v5
